<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#121B3A"/>
      <stop offset="100%" stop-color="#0B1020"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6FF0C6"/>
      <stop offset="100%" stop-color="#2EE6A6"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.18
                0 0 0 0 0.90
                0 0 0 0 0.65
                0 0 0 0.10 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- emblem group -->
  <g filter="url(#softGlow)" stroke="url(#accent)" stroke-linecap="round" stroke-linejoin="round">
    <!-- plate ring -->
    <circle cx="512" cy="520" r="250" stroke-width="28"/>

    <!-- fork (left) -->
    <path d="M318 352v156" stroke-width="24"/>
    <path d="M286 352v110" stroke-width="20"/>
    <path d="M318 352v110" stroke-width="20"/>
    <path d="M350 352v110" stroke-width="20"/>
    <path d="M318 508v262" stroke-width="24"/>

    <!-- spoon (right) -->
    <path d="M706 430c0-46 34-78 78-78s78 32 78 78-34 82-78 82-78-36-78-82Z" stroke-width="24"/>
    <path d="M784 512v258" stroke-width="24"/>

    <!-- check + calendar fold -->
    <path d="M410 540l64 64 156-176" stroke-width="30"/>
    <path d="M610 342h92c18 0 32 14 32 32v92" stroke-width="24"/>
    <path d="M702 374l32 0 0 32" stroke-width="24"/>
  </g>
</svg>
